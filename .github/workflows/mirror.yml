name: Mirror Telegram News
on:
  schedule:
    - cron: "0 * * * *" # تنظیم شده برای هر ۱ ساعت
  workflow_dispatch: # دکمه اجرای دستی
jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Latest News
        run: |
          curl -L https://t.me/s/Akhbare_madrs > index.html
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Hourly news update" || echo "No changes to commit"
          git push origin main
